<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
</head>
<body>

<h1>Registro de usuarios</h1>

<form action="/register" method="post">
    <label>Usuario:</label>
    <input name="username" required><br>

    <label>Password:</label>
    <input type="password" name="password" required><br>

    <button type="submit">Crear usuario</button>
</form>

<button id="btnMsg">Mostrar mensaje en el servidor</button>
<button id="btnLog">Ejecutar /log</button>

<button id="btnHello">Ejecutar /sayHello</button>

<script>

    let token = '';

    async function login() {

        const response = await fetch('http://localhost:8080/login',
    {
        method: 'POST',

        headers:
            {
                'x-user-id': 'admin',
                'x-api-key': '1234'
            }
        }
    );

        const data = await response.json();

        token = data.token;

        console.log('TOKEN:', token);
    }

    async function callEndpoint(path) {

        const response = await fetch('http://localhost:8080/log', {
    method: 'POST',

    headers: {
        'Content-Type': 'application/json',

        'Authorization': 'Bearer ' + token,
        'X-API-Version': '1.0',

        'x-user-id': 'admin',
        'x-api-key': '1234'
        },

        body: JSON.stringify({})
    });

        const text = await response.text();

        console.log(path, text);
    }

    window.onload = async () => {

        await login();

        btnLog.onclick = () => callEndpoint('/log');

        btnHello.onclick = () => callEndpoint('/sayHello');
    };

</script>

</body>
</html>
